<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI OOTD 무드 진단기 ✨</title>

  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <!-- Teachable Machine Image -->
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
  <!-- Kakao SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <div class="header-badge">2026 TREND</div>
      <h1 class="app-title">AI OOTD<br /><span class="gradient-text">무드 진단기</span></h1>
      <p class="app-subtitle">내 스타일이 어떤 무드인지<br />AI가 찰떡같이 알아맞혀 줄게 👀</p>
    </header>

    <!-- Upload Section -->
    <section class="upload-section">
      <label class="upload-label" for="imageUpload">
        <div class="upload-box" id="uploadBox">
          <div class="upload-icon">📸</div>
          <p class="upload-text">오늘의 OOTD 사진 업로드</p>
          <p class="upload-subtext">탭해서 사진 선택하기</p>
        </div>
      </label>
      <input type="file" id="imageUpload" accept="image/*" hidden />

      <!-- Image Preview -->
      <div class="preview-container" id="previewContainer">
        <img id="previewImage" src="" alt="업로드된 이미지 미리보기" />
        <button class="retake-btn" id="retakeBtn">다시 고르기 ↩</button>
      </div>
    </section>

    <!-- Analyze Button -->
    <div class="btn-area">
      <button class="analyze-btn" id="analyzeBtn" disabled>
        <span class="btn-text">무드 진단하기 ✨</span>
      </button>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner-ring"></div>
      <p class="loading-text" id="loadingText">AI가 당신의 무드를 스캔 중...</p>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Result Section -->
    <section class="result-section" id="resultSection">

      <!-- 무드 타이틀 카드 -->
      <div class="result-card result-card--main">
        <div class="result-badge" id="resultBadge">MOOD</div>
        <h2 class="result-title" id="resultTitle"></h2>
        <p class="result-desc" id="resultDesc"></p>
        <div class="confidence-bar-wrap">
          <div class="confidence-label">AI 확신도</div>
          <div class="confidence-bar">
            <div class="confidence-fill" id="confidenceFill"></div>
          </div>
          <div class="confidence-value" id="confidenceValue"></div>
        </div>
      </div>

      <!-- 추천 아이템 카드 -->
      <div class="result-card result-card--item">
        <div class="card-label">💡 스타일 업 아이템</div>
        <p class="item-text" id="resultItem"></p>
      </div>

      <!-- 짝꿍 카드 -->
      <div class="result-card-row">
        <div class="result-card result-card--match good">
          <div class="card-label">💚 잘 맞는 짝꿍</div>
          <p class="match-text" id="resultGoodMatch"></p>
        </div>
        <div class="result-card result-card--match bad">
          <div class="card-label">🔥 안 맞는 짝꿍</div>
          <p class="match-text" id="resultBadMatch"></p>
        </div>
      </div>

      <!-- Share Button -->
      <button class="share-btn" id="shareBtn">
        <span class="kakao-icon">💬</span>
        카카오톡으로 공유하기
      </button>

      <button class="retry-btn" id="retryBtn">처음부터 다시 하기 🔄</button>
    </section>

    <!-- Privacy Notice -->
    <footer class="privacy-notice">
      <span class="privacy-icon">🔒</span>
      업로드한 사진은 서버에 저장되지 않아요.<br />
      AI 분석은 내 브라우저 안에서만 이루어져요.
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
